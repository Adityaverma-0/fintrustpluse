openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: TrustFirst freelance marketplace API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: jobs
    description: Job posting operations
  - name: proposals
    description: Proposal operations
  - name: projects
    description: Project management operations
  - name: milestones
    description: Milestone operations
  - name: wallet
    description: Wallet operations
  - name: messages
    description: Messaging operations
  - name: notifications
    description: Notification operations
  - name: reviews
    description: Review operations
  - name: freelancers
    description: Freelancer profile operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List jobs
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Post a new job
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobInput"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a job by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /jobs/{jobId}/proposals:
    get:
      operationId: getJobProposals
      tags: [proposals]
      summary: Get proposals for a job
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of proposals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Proposal"

  /proposals:
    post:
      operationId: createProposal
      tags: [proposals]
      summary: Submit a proposal
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProposalInput"
      responses:
        "201":
          description: Proposal submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"

  /proposals/mine:
    get:
      operationId: getMyProposals
      tags: [proposals]
      summary: Get my submitted proposals
      security:
        - bearerAuth: []
      responses:
        "200":
          description: My proposals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Proposal"

  /proposals/{id}/status:
    patch:
      operationId: updateProposalStatus
      tags: [proposals]
      summary: Update proposal status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProposalStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List my projects
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Projects list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}/status:
    patch:
      operationId: updateProjectStatus
      tags: [projects]
      summary: Update project status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}/milestones:
    post:
      operationId: createMilestone
      tags: [milestones]
      summary: Add a milestone to a project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MilestoneInput"
      responses:
        "201":
          description: Milestone created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"

  /projects/{projectId}/milestones/{milestoneId}/status:
    patch:
      operationId: updateMilestoneStatus
      tags: [milestones]
      summary: Update milestone status
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: milestoneId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MilestoneStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"

  /wallet:
    get:
      operationId: getWallet
      tags: [wallet]
      summary: Get my wallet
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Wallet info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"

  /wallet/transactions:
    get:
      operationId: getWalletTransactions
      tags: [wallet]
      summary: Get wallet transactions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Transactions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WalletTransaction"

  /messages:
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /messages/conversations:
    get:
      operationId: getConversations
      tags: [messages]
      summary: Get conversation list
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

  /messages/{userId}:
    get:
      operationId: getMessages
      tags: [messages]
      summary: Get messages with a user
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Message thread
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: Get my notifications
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /reviews:
    post:
      operationId: createReview
      tags: [reviews]
      summary: Submit a review
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Review submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /users/{userId}/reviews:
    get:
      operationId: getUserReviews
      tags: [reviews]
      summary: Get reviews for a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reviews list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

  /freelancers:
    get:
      operationId: listFreelancers
      tags: [freelancers]
      summary: List freelancers
      responses:
        "200":
          description: Freelancers list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FreelancerProfile"

  /freelancers/{id}:
    get:
      operationId: getFreelancer
      tags: [freelancers]
      summary: Get freelancer profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Freelancer profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreelancerProfile"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
      required: [ok]

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        title:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        skills:
          type: ["string", "null"]
        hourlyRate:
          type: ["number", "null"]
        category:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        trustScore:
          type: ["number", "null"]
        totalEarned:
          type: ["number", "null"]
        totalSpent:
          type: ["number", "null"]
        completionRate:
          type: ["number", "null"]
        isVerified:
          type: ["boolean", "null"]
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, role, createdAt]

    RegisterInput:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          type: string
          enum: [freelancer, client]
        title:
          type: string
        bio:
          type: string
        skills:
          type: string
        hourlyRate:
          type: number
        category:
          type: string
        country:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required: [token, user]

    Job:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        budgetType:
          type: string
          enum: [fixed, hourly]
        budget:
          type: ["number", "null"]
        duration:
          type: ["string", "null"]
        experienceLevel:
          type: ["string", "null"]
        skills:
          type: ["string", "null"]
        status:
          type: string
        clientId:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, title, description, category, budgetType, clientId, createdAt]

    JobInput:
      type: object
      required: [title, description, category, budgetType, budget]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        category:
          type: string
        budgetType:
          type: string
          enum: [fixed, hourly]
        budget:
          type: number
        duration:
          type: string
        experienceLevel:
          type: string
        skills:
          type: string

    Proposal:
      type: object
      properties:
        id:
          type: integer
        jobId:
          type: integer
        freelancerId:
          type: integer
        coverLetter:
          type: string
        bidAmount:
          type: ["number", "null"]
        deliveryDays:
          type: integer
        status:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, jobId, freelancerId, coverLetter, deliveryDays, status, createdAt]

    ProposalInput:
      type: object
      required: [jobId, coverLetter, bidAmount, deliveryDays]
      properties:
        jobId:
          type: integer
        coverLetter:
          type: string
          minLength: 20
        bidAmount:
          type: number
        deliveryDays:
          type: integer

    ProposalStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [accepted, rejected, withdrawn]

    Project:
      type: object
      properties:
        id:
          type: integer
        jobId:
          type: ["integer", "null"]
        clientId:
          type: integer
        freelancerId:
          type: integer
        title:
          type: string
        description:
          type: string
        status:
          type: string
        budget:
          type: number
        deadline:
          type: ["string", "null"]
        completedAt:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        progress:
          type: ["integer", "null"]
      required: [id, clientId, freelancerId, title, description, status, budget, createdAt]

    ProjectInput:
      type: object
      required: [freelancerId, title, description, budget]
      properties:
        freelancerId:
          type: integer
        title:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        budget:
          type: number
        jobId:
          type: integer
        deadline:
          type: string
          format: date-time

    ProjectStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, completed, cancelled, paused]

    Milestone:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        amount:
          type: number
        status:
          type: string
        dueDate:
          type: ["string", "null"]
        submittedAt:
          type: ["string", "null"]
        approvedAt:
          type: ["string", "null"]
        deliverables:
          type: ["string", "null"]
        clientFeedback:
          type: ["string", "null"]
        order:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, projectId, title, amount, status, order, createdAt]

    MilestoneInput:
      type: object
      required: [title, amount]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        amount:
          type: number
        order:
          type: integer
        dueDate:
          type: string
          format: date-time

    MilestoneStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, in_progress, submitted, approved, released]
        deliverables:
          type: string
        clientFeedback:
          type: string

    Wallet:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        availableBalance:
          type: number
        escrowBalance:
          type: number
        totalEarned:
          type: number
        totalSpent:
          type: number
        createdAt:
          type: string
          format: date-time
      required: [id, userId, availableBalance, escrowBalance, totalEarned, totalSpent, createdAt]

    WalletTransaction:
      type: object
      properties:
        id:
          type: integer
        walletId:
          type: integer
        type:
          type: string
        amount:
          type: number
        description:
          type: string
        referenceId:
          type: ["integer", "null"]
        referenceType:
          type: ["string", "null"]
        status:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, walletId, type, amount, description, status, createdAt]

    Message:
      type: object
      properties:
        id:
          type: integer
        senderId:
          type: integer
        receiverId:
          type: integer
        projectId:
          type: ["integer", "null"]
        content:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, senderId, receiverId, content, isRead, createdAt]

    MessageInput:
      type: object
      required: [receiverId, content]
      properties:
        receiverId:
          type: integer
        content:
          type: string
          minLength: 1
        projectId:
          type: integer

    Conversation:
      type: object
      properties:
        partner:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            role:
              type: string
          required: [id, name, role]
        unreadCount:
          type: integer
      required: [partner, unreadCount]

    Notification:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          type: string
        title:
          type: string
        body:
          type: string
        link:
          type: ["string", "null"]
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, userId, type, title, body, isRead, createdAt]

    Review:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        reviewerId:
          type: integer
        revieweeId:
          type: integer
        rating:
          type: number
        comment:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required: [id, projectId, reviewerId, revieweeId, rating, createdAt]

    ReviewInput:
      type: object
      required: [projectId, revieweeId, rating]
      properties:
        projectId:
          type: integer
        revieweeId:
          type: integer
        rating:
          type: number
          minimum: 1
          maximum: 5
        comment:
          type: string

    FreelancerProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        title:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        skills:
          type: ["string", "null"]
        hourlyRate:
          type: ["number", "null"]
        category:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        trustScore:
          type: ["number", "null"]
        totalEarned:
          type: ["number", "null"]
        completionRate:
          type: ["number", "null"]
        isVerified:
          type: ["boolean", "null"]
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, role, createdAt]
